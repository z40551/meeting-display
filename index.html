<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Display</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

#container {
  width: 90%;
}

.meeting {
  margin: 60px 0;
}

.time {
  font-size: 90px;
  font-weight: 600;
}

.title {
  font-size: 48px;
  opacity: 0.7;
}

.now {
  color: #00ff88;
}

.empty {
  font-size: 80px;
  opacity: 0.5;
}
</style>
</head>

<body>
<div id="container"></div>

<script>
async function load() {
  const res = await fetch("/api/events");
  const data = await res.json();

  const container = document.getElementById("container");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<div class='empty'>No upcoming meetings</div>";
    return;
  }

  const now = new Date();

  data.forEach(event => {
    const start = new Date(event.start);
    const end = new Date(event.end);

    const isNow = now >= start && now <= end;

    const time = start.toLocaleTimeString("en-SG", {
      hour: '2-digit',
      minute: '2-digit'
    });

    const div = document.createElement("div");
    div.className = "meeting";

    div.innerHTML = `
      <div class="time ${isNow ? "now" : ""}">
        ${time} ${isNow ? "• NOW" : ""}
      </div>
      <div class="title">${event.title}</div>
    `;

    container.appendChild(div);
  });
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
