<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Display</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

#container {
  width: 90%;
}

.meeting {
  font-size: 80px;
  margin: 70px 0;
  font-weight: 600;
}
</style>
</head>

<body>
<div id="container"></div>

<script>
async function load() {
  const res = await fetch("/api/events");
  const data = await res.json();

  const container = document.getElementById("container");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<div class='meeting'>No upcoming meetings</div>";
    return;
  }

  // 只取最近4个
  data.slice(0,4).forEach(event => {

    const start = new Date(event.start);

    const time = start.toLocaleTimeString("en-SG", {
      hour: '2-digit',
      minute: '2-digit'
    });

    const div = document.createElement("div");
    div.className = "meeting";
    div.textContent = `${time}：${event.title}`;

    container.appendChild(div);
  });
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
