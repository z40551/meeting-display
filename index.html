<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meeting Board</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background: linear-gradient(135deg, #0f172a, #111827);
  }
</style>
</head>

<body class="text-white min-h-screen flex flex-col items-center p-10">

<!-- 标题 -->
<h1 class="text-6xl font-extrabold tracking-widest mb-2">
  MEETING BOARD
</h1>

<!-- 日期时间 -->
<div id="datetime" class="text-2xl text-slate-400 mb-10"></div>

<!-- 会议列表 -->
<div id="meetingList" class="w-full max-w-5xl space-y-6"></div>

<script>
function updateClock() {
  const now = new Date();
  const dateStr = now.toLocaleDateString(undefined, {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
  const timeStr = now.toLocaleTimeString();
  document.getElementById("datetime").innerText = dateStr + " | " + timeStr;
}

async function loadMeetings() {
  const res = await fetch("/api/events");
  const data = await res.json();

  const list = document.getElementById("meetingList");
  list.innerHTML = "";

  const now = new Date();
  const today = now.toISOString().split("T")[0];

  const todayMeetings = data.filter(m => m.start.startsWith(today));

  todayMeetings.sort((a, b) => new Date(a.start) - new Date(b.start));

  if (todayMeetings.length === 0) {
    list.innerHTML = "<div class='text-3xl opacity-60'>No meetings today 🎉</div>";
    return;
  }

  todayMeetings.forEach(m => {
    const start = new Date(m.start);
    const end = new Date(m.end);

    const timeStr =
      start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) +
      " - " +
      end.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    const div = document.createElement("div");

    let style = "bg-slate-800";

    // 会议进行中
    if (now >= start && now <= end) {
      style = "bg-green-600";
    }

    // 5分钟内开始
    if (start - now <= 5 * 60 * 1000 && start > now) {
      style = "bg-orange-500";
    }

    div.className = style + " rounded-2xl p-8 shadow-2xl transition-all duration-500";

    div.innerHTML = `
      <div class="text-3xl font-semibold">${m.title}</div>
      <div class="text-xl text-slate-200 mt-3">${timeStr}</div>
    `;

    list.appendChild(div);
  });
}

updateClock();
loadMeetings();

setInterval(updateClock, 1000);     // 时间每秒刷新
setInterval(loadMeetings, 300000);  // 每5分钟刷新会议
</script>


</body>
</html>
