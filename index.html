<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Display</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#container {
  width: 92%;
}

.meeting {
  display: flex;
  align-items: center;
  margin: 45px 0;
}

.dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #3aa0ff;
  margin-right: 30px;
  flex-shrink: 0;
}

.time {
  font-size: 48px;
  width: 420px;
  flex-shrink: 0;
}

.title {
  font-size: 54px;
  font-weight: 500;
}

.empty {
  font-size: 80px;
  opacity: 0.5;
}
</style>
</head>

<body>
<div id="container"></div>

<script>
function formatTimeRange(start, end) {
  const options = { hour: 'numeric', minute: '2-digit', hour12: true };

  const startStr = start.toLocaleTimeString("en-SG", options);
  const endStr = end.toLocaleTimeString("en-SG", options);

  return `${startStr} - ${endStr}`;
}

async function load() {
  const res = await fetch("/api/events");
  const data = await res.json();

  const container = document.getElementById("container");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<div class='empty'>No upcoming meetings</div>";
    return;
  }

  data.slice(0,4).forEach(event => {

    const start = new Date(event.start);
    const end = new Date(event.end);

    const div = document.createElement("div");
    div.className = "meeting";

    div.innerHTML = `
      <div class="dot"></div>
      <div class="time">${formatTimeRange(start, end)}</div>
      <div class="title">${event.title}</div>
    `;

    container.appendChild(div);
  });
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
