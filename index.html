<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meeting Display</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
  }
</style>
</head>
<body class="text-white min-h-screen flex flex-col items-center p-10">

<h1 class="text-5xl font-bold mb-10">📅 Today’s Meetings</h1>

<div id="meetingList" class="w-full max-w-4xl space-y-6"></div>

<script>
async function loadMeetings() {
  const res = await fetch("/api/calendar"); // 你的JSON接口路径
  const data = await res.json();

  const list = document.getElementById("meetingList");
  list.innerHTML = "";

  const today = new Date().toISOString().split("T")[0];

  const todayMeetings = data.filter(m => m.start.startsWith(today));

  todayMeetings.sort((a, b) => new Date(a.start) - new Date(b.start));

  if (todayMeetings.length === 0) {
    list.innerHTML = "<div class='text-3xl opacity-60'>No meetings today 🎉</div>";
    return;
  }

  todayMeetings.forEach(m => {
    const start = new Date(m.start);
    const end = new Date(m.end);

    const timeStr =
      start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) +
      " - " +
      end.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    const div = document.createElement("div");
    div.className = "bg-slate-800 rounded-2xl p-6 shadow-xl";

    div.innerHTML = `
      <div class="text-2xl font-semibold">${m.title}</div>
      <div class="text-lg text-slate-400 mt-2">${timeStr}</div>
    `;

    list.appendChild(div);
  });
}

loadMeetings();
setInterval(loadMeetings, 300000); // 每5分钟刷新
</script>

</body>
</html>
